<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingston Fun Day - Coming Soon</title>
    <!-- Tailwind CSS for clean layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body {
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: auto;
        }
        .content-layer {
            position: relative;
            z-index: 20;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }

        /* NEW: Bouncy Lettering Animation Logic */
        @keyframes bounceLetters {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            15% { transform: translateY(-8px) rotate(-1deg); }
            30% { transform: translateY(-10px) rotate(2deg); }
            45% { transform: translateY(0) rotate(0deg); }
            60% { transform: translateY(-3px) rotate(-0.5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .bounce-span span {
            display: inline-block;
            animation: bounceLetters 6s infinite ease-in-out;
            transform-origin: bottom;
        }

        /* Staggered Delays for "Occasionally Bouncy" feel */
        .bounce-span span:nth-child(1)  { animation-delay: 0.1s; }
        .bounce-span span:nth-child(2)  { animation-delay: 0.2s; }
        .bounce-span span:nth-child(3)  { animation-delay: 0.3s; }
        .bounce-span span:nth-child(4)  { animation-delay: 0.4s; }
        .bounce-span span:nth-child(5)  { animation-delay: 0.5s; }
        .bounce-span span:nth-child(6)  { animation-delay: 0.6s; }
        .bounce-span span:nth-child(7)  { animation-delay: 0.7s; }
        .bounce-span span:nth-child(8)  { animation-delay: 1.0s; } /* Longer pause */
        .bounce-span span:nth-child(9)  { animation-delay: 1.1s; }
        .bounce-span span:nth-child(10) { animation-delay: 1.2s; }
        .bounce-span span:nth-child(11) { animation-delay: 1.3s; }
        .bounce-span span:nth-child(12) { animation-delay: 1.4s; }
        .bounce-span span:nth-child(13) { animation-delay: 1.5s; }
        .bounce-span span:nth-child(14) { animation-delay: 1.6s; }
    </style>
</head>
<body class="bg-gradient-to-b from-sky-400 to-blue-500 min-h-screen flex items-center justify-center p-4 relative select-none">

    <!-- Interactive Balloon, Cloud, and Wind Canvas Layer -->
    <canvas id="balloonCanvas"></canvas>

    <!-- Wind Control Slider (Integrated Functional UI) -->

                <!-- SCORE TRACKER -->

            <!-- SOCIAL MEDIA LINKS -->
            <div class="flex flex-wrap justify-center items-center gap-6 pt-4 text-slate-600">

    <!-- Interactive Logic Script with Wind, Bouncy Strings, and Clouds FIX -->
    <script>
        const canvas = document.getElementById('balloonCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const windSlider = document.getElementById('windSlider');
        const windDisplay = document.getElementById('windDisplay');

        // Wind Speed Controller
        let windSpeed = 1.0; 
        let currentWindVelocity = windSpeed; // For smoothing changes

        windSlider.addEventListener('input', (e) => {
            windSpeed = parseFloat(e.target.value);
            windDisplay.innerText = windSpeed.toFixed(1);
        });

        // Track global logic time
        let time = 0;

        let scores = { total: 0 };
        let balloons = [];
        let clouds = []; // NEW: Array for clouds
        let particles = [];
        
        const colors = [
            { main: '#ff4a5a', string: '#cc3b48' }, // Red
            { main: '#3b82f6', string: '#2563eb' }, // Blue
            { main: '#eab308', string: '#ca8a04' }, // Yellow
            { main: '#22c55e', string: '#16a34a' }, // Green
            { main: '#a855f7', string: '#9333ea' }, // Purple
            { main: '#f97316', string: '#ea580c' }  // Orange
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // DEBRIS PARTICLE
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.gravity = 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // BALLOON (Preserved and Updated Bouncy Strings Logic)
        class Balloon {
            constructor() {
                this.r = Math.random() * 15 + 30; // Radius
                // Start below and spawn rightward with wind
                this.x = (Math.random() * canvas.width * 0.8) - canvas.width * 0.1;
                this.y = canvas.height + this.r + Math.random() * 100;
                this.floatSpeed = Math.random() * 1.5 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.wobbleAmount = Math.random() * 15 + 5;
                this.wobbleAngle = Math.random() * Math.PI;
                // Add unique phase and factor for coordinated sway
                this.uniquePhase = Math.random() * Math.PI * 2;
                this.baseWobble = Math.random() * 8 + 4;
            }

            update() {
                // Float UP
                this.y -= this.floatSpeed;
                
                // Coordinated movement based on wind (drift RIGHT)
                this.x += currentWindVelocity * 2.0;

                // Swaying motion coordinating body and string base
                // Wind increases the intensity of the sway
                this.wobbleAngle += this.wobbleSpeed * (1.0 + currentWindVelocity * 0.3);
                this.windSway = Math.sin(this.wobbleAngle) * this.wobbleAmount;
                this.currentX = this.x + this.windSway;
            }

            draw() {
                ctx.save();
                ctx.translate(this.currentX, this.y);

                // BALLOON STRING (Dynamic Sway Logic FIX)
                const stringLength = 40;
                const knotBaseY = this.r;
                
                ctx.beginPath();
                ctx.moveTo(0, knotBaseY);
                
                // String "bottom" point sways opposite and intensifies with wind
                // Calculate dynamic pendulum-like sway
                const timeFactor = time * 0.05;
                const stringSwayX = Math.sin(timeFactor + this.uniquePhase) * (20 + currentWindVelocity * 10);
                const stringSwayY = knotBaseY + stringLength + currentWindVelocity * 5;

                // Draw a simple sway
                ctx.bezierCurveTo(
                    stringSwayX * 0.5, knotBaseY + 15,
                    stringSwayX * 0.7, knotBaseY + 25,
                    stringSwayX, stringSwayY
                );

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 1.5 + currentWindVelocity * 0.1; // Thicker with wind
                ctx.stroke();

                // Balloon Knot Tie
                ctx.beginPath();
                ctx.moveTo(-4, this.r);
                ctx.lineTo(4, this.r);
                ctx.lineTo(0, this.r - 4);
                ctx.closePath();
                ctx.fillStyle = this.color.string;
                ctx.fill();

                // Balloon Body
                ctx.beginPath();
                ctx.ellipse(0, 0, this.r * 0.85, this.r, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color.main;
                ctx.fill();

                // Gloss Highlight/Shine
                ctx.beginPath();
                ctx.ellipse(-this.r * 0.3, -this.r * 0.4, this.r * 0.15, this.r * 0.3, Math.PI / 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();

                ctx.restore();
            }

            isHit(mx, my) {
                const dx = mx - this.currentX;
                const dy = my - this.y;
                return (dx * dx) / (this.r * 0.85 * this.r * 0.85) + (dy * dy) / (this.r * this.r) <= 1;
            }
        }

        // UPDATED: CLOUD CLASS (Friendly Cartoon Style)
        class Cloud {
            constructor() {
                this.x = - (Math.random() * 400 + 100); // Start off-screen left
                this.y = (Math.random() * canvas.height * 0.6) + 100; // Sky area
                this.w = (Math.random() * 100 + 150); // Width
                this.h = this.w * 0.6; // Height (ellipse aspect)
                this.speed = Math.random() * 0.5 + 0.2; // base speed
                this.color = 'rgba(255, 255, 255, 0.7)';
                // Unique subtle vertical wobble
                this.wobblePhase = Math.random() * Math.PI * 2;
            }

            update() {
                // Move RIGHT with logic speed and variable wind
                this.x += (this.speed + currentWindVelocity * 1.5);
                
                // Subtle vertical wobble
                this.currentY = this.y + Math.sin(time * 0.02 + this.wobblePhase) * 10;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                
                // Draw a simple, clean, friendly cartoon shape
                // One main body and two supporting bumps
                ctx.beginPath();
                // Main body
                ctx.ellipse(this.x, this.currentY, this.w, this.h, 0, 0, Math.PI * 2);
                // Lower Left bump
                ctx.ellipse(this.x - this.w * 0.6, this.currentY + this.h * 0.3, this.w * 0.5, this.h * 0.6, 0, 0, Math.PI * 2);
                // Lower Right bump
                ctx.ellipse(this.x + this.w * 0.6, this.currentY + this.h * 0.3, this.w * 0.5, this.h * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }

            isHit(mx, my) {
                const dx = mx - this.x;
                const dy = my - this.currentY;
                // Simple ellipse collision (good enough approximation for popping)
                return (dx * dx) / (this.w * this.w) + (dy * dy) / (this.h * this.h) <= 1;
            }
        }

        function createPopParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnBalloon() {
            if (balloons.length < 15 + Math.floor(currentWindVelocity)) { // More balloons when windy
                balloons.push(new Balloon());
            }
        }
        setInterval(spawnBalloon, 800);

        // SPAWN CLOUDS
        function spawnCloud() {
            if (clouds.length < 5 + Math.floor(currentWindVelocity / 2)) {
                clouds.push(new Cloud());
            }
        }
        setInterval(spawnCloud, 3000);

        function handlePop(clientX, clientY) {
            let hitFound = false;

            // Check balloons first
            for (let i = balloons.length - 1; i >= 0; i--) {
                if (balloons[i].isHit(clientX, clientY)) {
                    createPopParticles(balloons[i].currentX, balloons[i].y, balloons[i].color.main);
                    balloons.splice(i, 1);
                    scores.total++;
                    hitFound = true;
                    break; // Pop only one
                }
            }

            // If no balloon, check clouds
            if(!hitFound){
                for (let i = clouds.length - 1; i >= 0; i--) {
                    if (clouds[i].isHit(clientX, clientY)) {
                        createPopParticles(clouds[i].x, clouds[i].currentY, '#ffffff'); // Cloud debris
                        clouds.splice(i, 1);
                        scores.total++;
                        hitFound = true;
                        break;
                    }
                }
            }

            if(hitFound){
                scoreDisplay.innerText = scores.total;
            }
        }

        // Action Events
        canvas.addEventListener('click', (e) => handlePop(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handlePop(touch.clientX, touch.clientY);
        });

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time++;

            // Smoothly move current velocity towards targets
            currentWindVelocity += (windSpeed - currentWindVelocity) * 0.05;

            // Manage CLOUDS
            for (let i = clouds.length - 1; i >= 0; i--) {
                clouds[i].update();
                clouds[i].draw();
                // Remove if off-screen right
                if (clouds[i].x > canvas.width + clouds[i].w * 2) {
                    clouds.splice(i, 1);
                }
            }

            // Manage balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                balloons[i].update();
                balloons[i].draw();

                // Remove off-screen elements (up or far right)
                if (balloons[i].y < -balloons[i].r * 2 || balloons[i].x > canvas.width + balloons[i].r * 2) {
                    balloons.splice(i, 1);
                }
            }

            // Manage pop debris particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // Initialize Loop
        animate();
    </script>
</body>
