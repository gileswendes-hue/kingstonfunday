    <script>
        const canvas = document.getElementById('balloonCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let balloons = [];
        let particles = [];
        
        const colors = [
            { main: '#ff4a5a', string: '#cc3b48' }, // Red
            { main: '#3b82f6', string: '#2563eb' }, // Blue
            { main: '#eab308', string: '#ca8a04' }, // Yellow
            { main: '#22c55e', string: '#16a34a' }, // Green
            { main: '#a855f7', string: '#9333ea' }, // Purple
            { main: '#f97316', string: '#ea580c' }  // Orange
        ];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Balloon {
            constructor() {
                this.r = Math.random() * 15 + 30; // Radius
                this.x = Math.random() * (canvas.width - this.r * 2) + this.r;
                this.y = canvas.height + this.r + Math.random() * 100;
                this.speed = Math.random() * 1.5 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.wobbleAmount = Math.random() * 15 + 5;
                this.wobbleAngle = Math.random() * Math.PI;
            }

            update() {
                this.y -= this.speed;
                this.wobbleAngle += this.wobbleSpeed;
                this.currentX = this.x + Math.sin(this.wobbleAngle) * this.wobbleAmount;
            }

            draw() {
                ctx.save();
                ctx.translate(this.currentX, this.y);

                // Balloon String
                ctx.beginPath();
                ctx.moveTo(0, this.r);
                ctx.bezierCurveTo(-5, this.r + 15, 5, this.r + 25, 0, this.r + 40);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Balloon Knot Tie
                ctx.beginPath();
                ctx.moveTo(-4, this.r);
                ctx.lineTo(4, this.r);
                ctx.lineTo(0, this.r - 4);
                ctx.closePath();
                ctx.fillStyle = this.color.string;
                ctx.fill();

                // Balloon Body
                ctx.beginPath();
                ctx.ellipse(0, 0, this.r * 0.85, this.r, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color.main;
                ctx.fill();

                // Gloss Highlight/Shine
                ctx.beginPath();
                ctx.ellipse(-this.r * 0.3, -this.r * 0.4, this.r * 0.15, this.r * 0.3, Math.PI / 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fill();

                ctx.restore();
            }

            isHit(mx, my) {
                const dx = mx - this.currentX;
                const dy = my - this.y;
                // Standard ellipse collision metric approximation
                return (dx * dx) / (this.r * 0.85 * this.r * 0.85) + (dy * dy) / (this.r * this.r) <= 1;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.gravity = 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createPopParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnBalloon() {
            if (balloons.length < 15) {
                balloons.push(new Balloon());
            }
        }
        setInterval(spawnBalloon, 800);

        function handlePop(clientX, clientY) {
            for (let i = balloons.length - 1; i >= 0; i--) {
                if (balloons[i].isHit(clientX, clientY)) {
                    createPopParticles(balloons[i].currentX, balloons[i].y, balloons[i].color.main);
                    balloons.splice(i, 1);
                    score++;
                    scoreDisplay.innerText = score;
                    break; 
                }
            }
        }

        // Action Events
        canvas.addEventListener('click', (e) => handlePop(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches;
            handlePop(touch.clientX, touch.clientY);
        });

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Manage balloons
            for (let i = balloons.length - 1; i >= 0; i--) {
                balloons[i].update();
                balloons[i].draw();

                // Remove off-screen elements
                if (balloons[i].y < -balloons[i].r * 2) {
                    balloons.splice(i, 1);
                }
            }

            // Manage pop debris particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // Initialize Loop
        animate();
    </script>
</body>
</html>
